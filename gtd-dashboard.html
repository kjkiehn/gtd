<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GTD Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0e0c;color:#e8e0d0;font-family:Georgia,serif;min-height:100vh}
.header{border-bottom:1px solid #2a2820;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.sub{font-size:11px;color:#6b6456;letter-spacing:0.15em;text-transform:uppercase;margin-left:10px}
.stats{font-size:12px;color:#6b6456;display:flex;gap:16px;align-items:center}
.refresh{background:transparent;border:1px solid #2a2820;border-radius:4px;color:#6b6456;cursor:pointer;padding:3px 8px;font-size:11px;font-family:Georgia,serif}
.refresh:hover{color:#e8e0d0;border-color:#6b6456}
.layout{display:flex;height:calc(100vh - 53px);overflow:hidden}
.sidebar{width:190px;border-right:1px solid #2a2820;padding:12px 0;flex-shrink:0;overflow-y:auto}
.nav-btn{width:100%;background:transparent;border:none;border-left:2px solid transparent;color:#6b6456;cursor:pointer;padding:9px 18px;text-align:left;font-size:13px;font-family:Georgia,serif;display:flex;align-items:center;justify-content:space-between;transition:all 0.15s}
.nav-btn:hover{color:#e8e0d0}
.nav-btn.active{background:#1e1c18;border-left-color:#c9a96e;color:#e8e0d0}
.badge{background:#2a2820;color:#6b6456;border-radius:10px;padding:1px 7px;font-size:11px;font-family:monospace}
.nav-btn.active .badge{background:#c9a96e;color:#0f0e0c}
.divider{border-top:1px solid #2a2820;margin:8px 0}
.main{flex:1;overflow-y:auto;padding:20px 24px}
.list-header{display:flex;align-items:baseline;gap:10px;margin-bottom:16px}
.list-header h2{font-size:18px;font-weight:600}
.count{font-size:12px;color:#6b6456}
.item{background:#1a1814;border:1px solid #2a2820;border-radius:6px;padding:10px 14px;display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;cursor:pointer;transition:border-color 0.15s}
.item:hover{border-color:#3a3828}
.item.expanded{border-color:#3a3828}
.circle{width:18px;height:18px;border-radius:50%;border:1.5px solid #3a3628;background:transparent;cursor:pointer;flex-shrink:0;margin-top:1px;transition:all 0.15s}
.circle:hover{background:#c9a96e;border-color:#c9a96e}
.item-body{flex:1;min-width:0}
.item-title{font-size:13px;line-height:1.4}
.item-details{margin-top:8px;font-size:12px;color:#9a9080;display:none;flex-direction:column;gap:4px}
.item.expanded .item-details{display:flex}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.tag{background:#2a2820;color:#9a9080;padding:2px 8px;border-radius:10px;font-size:11px}
.project-item{background:#1a1814;border:1px solid #2a2820;border-radius:6px;padding:12px 16px;margin-bottom:8px;cursor:pointer}
.project-name{font-size:14px;display:flex;justify-content:space-between;align-items:flex-start}
.project-outcome{margin-top:8px;font-size:12px;color:#9a9080;border-top:1px solid #2a2820;padding-top:8px;display:none}
.project-item.expanded .project-outcome{display:block}
.area-tag{font-size:11px;color:#6b6456;background:#2a2820;padding:2px 8px;border-radius:10px}
.empty{color:#6b6456;font-size:13px;font-style:italic}
.loading{color:#6b6456;font-size:13px}
.error{background:#2a1810;border:1px solid #4a2820;border-radius:6px;padding:12px 16px;font-size:12px;color:#c97060}

.data-card{background:#1a1814;border:1px solid #2a2820;border-radius:6px;padding:16px;margin-bottom:16px}
.data-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.data-card-title{font-size:14px;font-weight:600}
.copy-btn{background:transparent;border:1px solid #2a2820;border-radius:4px;color:#6b6456;cursor:pointer;padding:3px 10px;font-size:11px;font-family:Georgia,serif}
.copy-btn:hover{color:#e8e0d0;border-color:#6b6456}
.copy-btn.copied{border-color:#4a7c59;color:#4a7c59}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{padding:7px 12px;text-align:left;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:#6b6456;font-weight:normal;border-bottom:1px solid #2a2820}
.data-table td{padding:7px 12px;border-bottom:1px solid #1e1c18;color:#e8e0d0}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#0f0e0c}
.data-table td:last-child{text-align:right;font-family:monospace;color:#c9a96e}
.data-table th:last-child{text-align:right}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:baseline"><h1>GTD</h1><span class="sub">Dashboard</span></div>
  <div class="stats" id="stats"><span>Loading...</span><button class="refresh" onclick="loadData()">&#8635; refresh</button></div>
</div>
<div class="layout">
  <div class="sidebar">
    <button class="nav-btn" onclick="showList(this,'today')" id="btn-today" class="nav-btn active">&#9728; Today <span class="badge" id="c-today">0</span></button>
    <div class="divider"></div>
    <button class="nav-btn" onclick="showList(this,'inbox')" id="btn-inbox">&#11015; Inbox <span class="badge" id="c-inbox">0</span></button>
    <button class="nav-btn" onclick="showList(this,'next')" id="btn-next">&#9889; Next Actions <span class="badge" id="c-next">0</span></button>
    <button class="nav-btn" onclick="showList(this,'waiting')" id="btn-waiting">&#8987; Waiting For <span class="badge" id="c-waiting">0</span></button>
    <button class="nav-btn" onclick="showList(this,'someday')" id="btn-someday">&#127793; Someday <span class="badge" id="c-someday">0</span></button>
    <button class="nav-btn" onclick="showList(this,'reference')" id="btn-reference">&#128193; Reference <span class="badge" id="c-reference">0</span></button>
    <div class="divider"></div>
    <button class="nav-btn" onclick="showList(this,'projects')" id="btn-projects">&#128193; Projects <span class="badge" id="c-projects">0</span></button>
    <div class="divider"></div>
    <button class="nav-btn" onclick="showList(this,'data')" id="btn-data">&#9776; Data <span class="badge" id="c-data">0</span></button>

  </div>
  <div class="main" id="main"><div class="loading">Loading your data...</div></div>
</div>
<script>
var SBU = "https://vmzopccmnfccjvdrzsxe.supabase.co";
var SBK = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZtem9wY2NtbmZjY2p2ZHJ6c3hlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjcxODksImV4cCI6MjA4ODc0MzE4OX0.pQR_ujvl4KJVSEZEUs1zHa741yT6X_cfp3X-Xi2s-ks";
var items = [], projects = [], tables = [], currentList = "today", currentBtn = document.getElementById("btn-today");

async function loadData() {
  try {
    var h = { apikey: SBK, Authorization: "Bearer " + SBK };
    var ir = await fetch(SBU + "/rest/v1/gtd_items?select=*&status=neq.completed&order=created_at.desc", { headers: h });
    var pr = await fetch(SBU + "/rest/v1/gtd_projects?select=*&order=created_at.desc", { headers: h });
    var tr = await fetch(SBU + "/rest/v1/gtd_tables?select=*&order=created_at.desc", { headers: h });
    items = await ir.json();
    projects = await pr.json();
    tables = await tr.json();
    updateCounts();
    renderList(currentList);
    document.getElementById("stats").innerHTML =
      items.filter(function(i){return i.list==="inbox";}).length + " inbox | " +
      items.filter(function(i){return i.list==="next";}).length + " next | " +
      projects.length + " projects " +
      "<button class='refresh' onclick='loadData()'>&#8635; refresh</button>";
  } catch(e) {
    document.getElementById("main").innerHTML = "<div class='error'>Failed to load: " + e.message + "</div>";
  }
}

function updateCounts() {
  var today = new Date().toISOString().split("T")[0];
  ["inbox","next","waiting","someday","reference"].forEach(function(l) {
    document.getElementById("c-" + l).textContent = items.filter(function(i){return i.list===l;}).length;
  });
  document.getElementById("c-projects").textContent = projects.length;
  var todayItems = items.filter(function(i){
    return i.list === "next" && (!i.due_date || i.due_date <= today);
  });
  document.getElementById("c-today").textContent = todayItems.length;
}

function showList(btn, list) {
  if (currentBtn) currentBtn.classList.remove("active");
  btn.classList.add("active");
  currentBtn = btn; currentList = list;
  renderList(list);
}

function renderList(list) {
  var main = document.getElementById("main");
  var today = new Date().toISOString().split("T")[0];
  var icons = {today:"&#9728;",inbox:"&#11015;",next:"&#9889;",waiting:"&#8987;",someday:"&#127793;",reference:"&#128193;",projects:"&#128193;"};
  var labels = {today:"Today",inbox:"Inbox",next:"Next Actions",waiting:"Waiting For",someday:"Someday / Maybe",reference:"Reference",projects:"Projects"};


  if (list === "today") {
    var filtered = items.filter(function(i){
      return i.list === "next" && (!i.due_date || i.due_date <= today);
    });
    var html = "<div class=\'list-header\'><h2>&#9728; Today</h2><span class=\'count\'>" + filtered.length + " items</span></div>";
    if (!filtered.length) html += "<div class=\'empty\'>Nothing due today.</div>";
    else filtered.forEach(function(item) {
      html += "<div class=\'item\' onclick=\'toggleItem(this)\'>";
      html += "<button class=\'circle\' onclick=\'completeItem(event,\"" + item.id + "\")\' title=\'Complete\'></button>";
      html += "<div class=\'item-body\'><div class=\'item-title\'>" + esc(item.title) + "</div>";
      html += "<div class=\'item-details\'>";
      if (item.notes) html += "<div>" + esc(item.notes) + "</div>";
      var tags = "";
      if (item.project) tags += "<span class=\'tag\'>&#8599; " + esc(item.project) + "</span>";
      if (item.area) tags += "<span class=\'tag\'>" + esc(item.area) + "</span>";
      if (item.due_date) tags += "<span class=\'tag\'>&#128197; " + esc(item.due_date) + "</span>";
      if (tags) html += "<div class=\'tags\'>" + tags + "</div>";
      html += "</div></div></div>";
    });
    main.innerHTML = html; return;
  }

  if (list === "projects") {
    var html = "<div class='list-header'><h2>" + icons.projects + " Projects</h2><span class='count'>" + projects.length + " items</span></div>";
    if (!projects.length) html += "<div class='empty'>No projects yet.</div>";
    else projects.forEach(function(p) {
      var projItems = items.filter(function(i){ return i.project === p.name; });
      var nextItems = projItems.filter(function(i){ return i.list === 'next'; });
      var waitItems = projItems.filter(function(i){ return i.list === 'waiting'; });
      var totalActions = projItems.length;

      html += "<div class='project-item' onclick='this.classList.toggle(\"expanded\")'>";
      html += "<div style='display:flex;justify-content:space-between;align-items:center'>";
      html += "<span style='font-size:14px;font-weight:600'>" + esc(p.name) + "</span>";
      html += "<div style='display:flex;align-items:center;gap:8px'>";
      if (p.area) html += "<span style='font-size:11px;color:#6b6456;background:#2a2820;padding:2px 8px;border-radius:10px'>" + esc(p.area) + "</span>";
      html += "<span style='font-size:11px;color:#6b6456;background:#2a2820;padding:2px 8px;border-radius:10px'>" + totalActions + " action" + (totalActions !== 1 ? "s" : "") + "</span>";
      html += "<span style='color:#3a3628;font-size:11px'>&#9654;</span>";
      html += "</div></div>";
      if (p.outcome) html += "<div style='margin-top:6px;font-size:12px;color:#9a9080;font-style:italic'>" + esc(p.outcome) + "</div>";

      html += "<div style='margin-top:10px;border-top:1px solid #2a2820;padding-top:10px;display:none' class='proj-actions'>";
      if (!projItems.length) {
        html += "<div style='font-size:12px;color:#3a3628;font-style:italic'>No actions yet</div>";
      } else {
        if (nextItems.length) {
          html += "<div style='font-size:11px;color:#6b6456;margin-bottom:4px'>&#9889; NEXT</div>";
          nextItems.forEach(function(i) {
            html += "<div style='display:flex;align-items:center;gap:8px;padding:7px 10px;background:#0f0e0c;border-radius:4px;border:1px solid #2a2820;margin-bottom:4px'>";
            html += "<button style='width:16px;height:16px;border-radius:50%;border:1.5px solid #3a3628;background:transparent;cursor:pointer;flex-shrink:0' onclick='event.stopPropagation();completeItem(event,\"" + i.id + "\")' title='Complete'></button>";
            html += "<span style='font-size:12px;flex:1'>" + esc(i.title) + "</span>";
            html += "</div>";
          });
        }
        if (waitItems.length) {
          html += "<div style='font-size:11px;color:#6b6456;margin-bottom:4px;margin-top:6px'>&#8987; WAITING</div>";
          waitItems.forEach(function(i) {
            html += "<div style='display:flex;align-items:center;gap:8px;padding:7px 10px;background:#0f0e0c;border-radius:4px;border:1px solid #2a2820;margin-bottom:4px'>";
            html += "<span style='font-size:12px;flex:1;color:#9a9080'>" + esc(i.title) + "</span>";
            if (i.waiting_for) html += "<span style='font-size:11px;color:#6b6456'>" + esc(i.waiting_for) + "</span>";
            html += "</div>";
          });
        }
      }
      html += "</div>";
      html += "</div>";
    });
    main.innerHTML = html;

    // Show proj-actions divs when expanded
    main.querySelectorAll('.project-item').forEach(function(el) {
      el.addEventListener('click', function() {
        var pa = this.querySelector('.proj-actions');
        if (pa) pa.style.display = this.classList.contains('expanded') ? 'block' : 'none';
      });
    });
    return;
  }


  if (list === "data") {
    var html = "<div class='list-header'><h2>&#9776; Data</h2><span class='count'>" + tables.length + " tables</span></div>";
    if (!tables.length) { html += "<div class='empty'>No data tables yet.</div>"; main.innerHTML = html; return; }
    tables.forEach(function(t, ti) {
      html += "<div class='data-card'>";
      html += "<div class='data-card-header'>";
      html += "<span class='data-card-title'>" + esc(t.title) + "</span>";
      if (t.area) html += "<span style='font-size:11px;color:#6b6456;background:#2a2820;padding:2px 8px;border-radius:10px;margin-right:8px'>" + esc(t.area) + "</span>";
      html += "<button class='copy-btn' id='copybtn-" + ti + "' onclick='copyTable(" + ti + ")'>&#128203; Copy</button>";
      html += "</div>";
      html += "<table class='data-table' id='tbl-" + ti + "'><thead><tr>";
      t.headers.forEach(function(h) { html += "<th>" + esc(h) + "</th>"; });
      html += "</tr></thead><tbody>";
      t.rows.forEach(function(row) {
        html += "<tr>";
        row.forEach(function(cell) { html += "<td>" + esc(cell) + "</td>"; });
        html += "</tr>";
      });
      html += "</tbody></table></div>";
    });
    main.innerHTML = html; return;
  }

  var filtered = items.filter(function(i){return i.list===list;});
  var html = "<div class='list-header'><h2>" + icons[list] + " " + labels[list] + "</h2><span class='count'>" + filtered.length + " items</span></div>";
  if (!filtered.length) html += "<div class='empty'>This list is empty.</div>";
  else filtered.forEach(function(item) {
    html += "<div class='item' onclick='toggleItem(this)'>";
    html += "<button class='circle' onclick='completeItem(event,\"" + item.id + "\")' title='Mark complete'></button>";
    html += "<div class='item-body'><div class='item-title'>" + esc(item.title) + "</div>";
    html += "<div class='item-details'>";
    if (item.notes) html += "<div>" + esc(item.notes) + "</div>";
    var tags = "";
    if (item.context) tags += "<span class='tag'>" + esc(item.context) + "</span>";
    if (item.project) tags += "<span class='tag'>&#8599; " + esc(item.project) + "</span>";
    if (item.area) tags += "<span class='tag'>" + esc(item.area) + "</span>";
    if (item.energy) tags += "<span class='tag'>&#9889; " + esc(item.energy) + "</span>";
    if (item.due_date) tags += "<span class='tag'>&#128197; " + esc(item.due_date) + "</span>";
    if (item.waiting_for) tags += "<span class='tag'>&#8987; " + esc(item.waiting_for) + "</span>";
    if (tags) html += "<div class='tags'>" + tags + "</div>";
    html += "</div></div></div>";
  });
  main.innerHTML = html;
}

function toggleItem(el) { el.classList.toggle("expanded"); }
function toggleProject(el) { el.classList.toggle("expanded"); }

async function completeItem(e, id) {
  e.stopPropagation();
  try {
    var res = await fetch("https://vmzopccmnfccjvdrzsxe.supabase.co/functions/v1/gtd-complete", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: id })
    });
    var data = await res.json();
    items = items.filter(function(i){return i.id !== id;});
    updateCounts(); renderList(currentList);
    if (data.recurring) {
      // Reload to show the new instance
      setTimeout(function(){ loadData(); }, 500);
    }
  } catch(e) { alert("Error: " + e.message); }
}


function copyTable(ti) {
  var t = tables[ti];
  var text = t.headers.join('\t') + '\n';
  t.rows.forEach(function(row) { text += row.join('\t') + '\n'; });
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('copybtn-' + ti);
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(function(){ btn.textContent = '\u{1F4CB} Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function esc(s) {
  if (!s) return "";
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

loadData();
</script>
</body>
</html>
