<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GTD Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0e0c;color:#e8e0d0;font-family:Georgia,serif;min-height:100vh}
.header{border-bottom:1px solid #2a2820;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.sub{font-size:11px;color:#6b6456;letter-spacing:0.15em;text-transform:uppercase;margin-left:10px}
.stats{font-size:12px;color:#6b6456;display:flex;gap:16px;align-items:center}
.refresh{background:transparent;border:1px solid #2a2820;border-radius:4px;color:#6b6456;cursor:pointer;padding:3px 8px;font-size:11px;font-family:Georgia,serif}
.refresh:hover{color:#e8e0d0;border-color:#6b6456}
.layout{display:flex;height:calc(100vh - 53px);overflow:hidden}
.sidebar{width:190px;border-right:1px solid #2a2820;padding:12px 0;flex-shrink:0;overflow-y:auto}
.nav-btn{width:100%;background:transparent;border:none;border-left:2px solid transparent;color:#6b6456;cursor:pointer;padding:9px 18px;text-align:left;font-size:13px;font-family:Georgia,serif;display:flex;align-items:center;justify-content:space-between;transition:all 0.15s}
.nav-btn:hover{color:#e8e0d0}
.nav-btn.active{background:#1e1c18;border-left-color:#c9a96e;color:#e8e0d0}
.badge{background:#2a2820;color:#6b6456;border-radius:10px;padding:1px 7px;font-size:11px;font-family:monospace}
.nav-btn.active .badge{background:#c9a96e;color:#0f0e0c}
.divider{border-top:1px solid #2a2820;margin:8px 0}
.main{flex:1;overflow-y:auto;padding:20px 24px}
.list-header{display:flex;align-items:baseline;gap:10px;margin-bottom:16px}
.list-header h2{font-size:18px;font-weight:600}
.count{font-size:12px;color:#6b6456}
.item{background:#1a1814;border:1px solid #2a2820;border-radius:6px;padding:10px 14px;display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;cursor:pointer;transition:border-color 0.15s}
.item:hover{border-color:#3a3828}
.item.expanded{border-color:#3a3828}
.circle{width:18px;height:18px;border-radius:50%;border:1.5px solid #3a3628;background:transparent;cursor:pointer;flex-shrink:0;margin-top:1px;transition:all 0.15s}
.circle:hover{background:#c9a96e;border-color:#c9a96e}
.item-body{flex:1;min-width:0}
.item-title{font-size:13px;line-height:1.4}
.item-details{margin-top:8px;font-size:12px;color:#9a9080;display:none;flex-direction:column;gap:4px}
.item.expanded .item-details{display:flex}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.tag{background:#2a2820;color:#9a9080;padding:2px 8px;border-radius:10px;font-size:11px}
.empty{color:#6b6456;font-size:13px;font-style:italic}
.loading{color:#6b6456;font-size:13px}
.error{background:#2a1810;border:1px solid #4a2820;border-radius:6px;padding:12px 16px;font-size:12px;color:#c97060}
.view-data-btn{background:#2a2820;border:1px solid #3a3828;border-radius:4px;color:#c9a96e;cursor:pointer;padding:3px 10px;font-size:11px;font-family:Georgia,serif;margin-top:8px}
.view-data-btn:hover{background:#3a3828}
.data-card{background:#1a1814;border:1px solid #2a2820;border-radius:6px;padding:16px;margin-bottom:16px;transition:border-color 0.3s}
.data-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.data-card-title{font-size:14px;font-weight:600}
.copy-btn{background:transparent;border:1px solid #2a2820;border-radius:4px;color:#6b6456;cursor:pointer;padding:3px 10px;font-size:11px;font-family:Georgia,serif}
.copy-btn:hover{color:#e8e0d0;border-color:#6b6456}
.copy-btn.copied{border-color:#4a7c59;color:#4a7c59}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{padding:7px 12px;text-align:left;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:#6b6456;font-weight:normal;border-bottom:1px solid #2a2820}
.data-table td{padding:7px 12px;border-bottom:1px solid #1e1c18;color:#e8e0d0}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#0f0e0c}
.data-table td:last-child,.data-table th:last-child{text-align:right;font-family:monospace;color:#c9a96e}
.archive-item{background:#1a1814;border:1px solid #1e1c18;border-radius:6px;padding:9px 14px;display:flex;align-items:center;gap:10px;margin-bottom:5px}
.restore-btn{background:transparent;border:1px solid #2a2820;border-radius:4px;color:#6b6456;cursor:pointer;padding:2px 8px;font-size:11px;font-family:Georgia,serif;flex-shrink:0}
.restore-btn:hover{color:#e8e0d0;border-color:#6b6456}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2a2820;border:1px solid #c9a96e;border-radius:6px;padding:10px 16px;font-size:13px;color:#e8e0d0;display:flex;align-items:center;gap:12px;z-index:999;opacity:0;transition:opacity 0.2s;pointer-events:none}
.toast.show{opacity:1;pointer-events:all}
.toast-undo{background:transparent;border:1px solid #c9a96e;border-radius:4px;color:#c9a96e;cursor:pointer;padding:2px 10px;font-size:12px;font-family:Georgia,serif}
.toast-undo:hover{background:#c9a96e;color:#0f0e0c}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:baseline"><h1>GTD</h1><span class="sub">Dashboard</span></div>
  <div class="stats" id="stats"><span>Loading...</span><button class="refresh" onclick="loadData()">&#8635; refresh</button></div>
</div>
<div class="layout">
  <div class="sidebar">
    <button class="nav-btn active" onclick="showList(this,'today')" id="btn-today">&#9728; Today <span class="badge" id="c-today">0</span></button>
    <div class="divider"></div>
    <button class="nav-btn" onclick="showList(this,'inbox')" id="btn-inbox">&#11015; Inbox <span class="badge" id="c-inbox">0</span></button>
    <button class="nav-btn" onclick="showList(this,'next')" id="btn-next">&#9889; Next Actions <span class="badge" id="c-next">0</span></button>
    <button class="nav-btn" onclick="showList(this,'waiting')" id="btn-waiting">&#8987; Waiting For <span class="badge" id="c-waiting">0</span></button>
    <button class="nav-btn" onclick="showList(this,'someday')" id="btn-someday">&#127793; Someday <span class="badge" id="c-someday">0</span></button>
    <button class="nav-btn" onclick="showList(this,'reference')" id="btn-reference">&#128193; Reference <span class="badge" id="c-reference">0</span></button>
    <div class="divider"></div>
    <button class="nav-btn" onclick="showList(this,'projects')" id="btn-projects">&#128193; Projects <span class="badge" id="c-projects">0</span></button>
    <button class="nav-btn" onclick="showList(this,'data')" id="btn-data">&#9776; Data <span class="badge" id="c-data">0</span></button>
    <button class="nav-btn" onclick="showList(this,'areas')" id="btn-areas">&#9632; Areas</button>
    <button class="nav-btn" onclick="showList(this,'archive')" id="btn-archive">&#128452; Archive</button>
  </div>
  <div class="main" id="main"><div class="loading">Loading your data...</div></div>
</div>
<div class="toast" id="toast">
  <span id="toast-msg">Item completed</span>
  <button class="toast-undo" onclick="undoComplete()">Undo</button>
</div>
<script>
var SBU = "https://vmzopccmnfccjvdrzsxe.supabase.co";
var SBK = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZtem9wY2NtbmZjY2p2ZHJ6c3hlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjcxODksImV4cCI6MjA4ODc0MzE4OX0.pQR_ujvl4KJVSEZEUs1zHa741yT6X_cfp3X-Xi2s-ks";
var items = [], projects = [], tables = [];
var currentList = "today", currentBtn = document.getElementById("btn-today");
var undoItem = null, undoTimer = null;

function esc(s) {
  if (!s) return "";
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

async function loadData() {
  try {
    var h = { apikey: SBK, Authorization: "Bearer " + SBK };
    var results = await Promise.all([
      fetch(SBU + "/rest/v1/gtd_items?select=*&status=neq.completed&order=created_at.desc", { headers: h }),
      fetch(SBU + "/rest/v1/gtd_projects?select=*&order=created_at.desc", { headers: h }),
      fetch(SBU + "/rest/v1/gtd_tables?select=*&order=created_at.desc", { headers: h })
    ]);
    items = await results[0].json();
    projects = await results[1].json();
    tables = await results[2].json();
    updateCounts();
    renderList(currentList);
    document.getElementById("stats").innerHTML =
      items.filter(function(i){ return i.list === "inbox"; }).length + " inbox | " +
      items.filter(function(i){ return i.list === "next"; }).length + " next | " +
      projects.length + " projects " +
      "<button class='refresh' onclick='loadData()'>&#8635; refresh</button>";
  } catch(e) {
    document.getElementById("main").innerHTML = "<div class='error'>Failed to load: " + e.message + "</div>";
  }
}

function updateCounts() {
  var today = new Date().toISOString().split("T")[0];
  ["inbox","next","waiting","someday","reference"].forEach(function(l) {
    document.getElementById("c-" + l).textContent = items.filter(function(i){ return i.list === l; }).length;
  });
  document.getElementById("c-projects").textContent = projects.length;
  document.getElementById("c-data").textContent = tables.length;
  document.getElementById("c-today").textContent = items.filter(function(i){
    return i.list === "next" && (!i.due_date || i.due_date <= today);
  }).length;
}

function showList(btn, list) {
  if (currentBtn) currentBtn.classList.remove("active");
  btn.classList.add("active");
  currentBtn = btn;
  currentList = list;
  renderList(list);
}

function renderItem(item) {
  var h = "<div class='item' onclick='this.classList.toggle(\"expanded\")'>";
  h += "<button class='circle' onclick='event.stopPropagation();completeItem(event,\"" + item.id + "\")' title='Complete'></button>";
  h += "<div class='item-body'><div class='item-title'>" + esc(item.title) + "</div>";
  h += "<div class='item-details'>";
  if (item.notes) h += "<div>" + esc(item.notes) + "</div>";
  var tags = "";
  if (item.context) tags += "<span class='tag'>" + esc(item.context) + "</span>";
  if (item.project) tags += "<span class='tag'>&#8599; " + esc(item.project) + "</span>";
  if (item.area) tags += "<span class='tag'>" + esc(item.area) + "</span>";
  if (item.energy) tags += "<span class='tag'>&#9889; " + esc(item.energy) + "</span>";
  if (item.due_date) tags += "<span class='tag'>&#128197; " + esc(item.due_date) + "</span>";
  if (item.waiting_for) tags += "<span class='tag'>&#8987; " + esc(item.waiting_for) + "</span>";
  if (tags) h += "<div class='tags'>" + tags + "</div>";
  // View Data button if linked table exists
  var linked = tables.find(function(t){ return t.reference_item_id === item.id; });
  if (linked) {
    h += "<button class='view-data-btn' onclick='event.stopPropagation();jumpToTable(\"" + linked.id + "\")'>&#9776; View Data</button>";
  }
  h += "</div></div></div>";
  return h;
}

function renderList(list) {
  var main = document.getElementById("main");
  var today = new Date().toISOString().split("T")[0];

  if (list === "today") {
    var days = ["sunday","monday","tuesday","wednesday","thursday","friday","saturday"];
    var todayDay = days[new Date().getDay()];
    var filtered = items.filter(function(i){
      if (i.list !== "next") return false;
      if (i.recurrence_day && i.recurrence_day === todayDay) return true;
      return !i.due_date || i.due_date <= today;
    });
    var h = "<div class='list-header'><h2>&#9728; Today</h2><span class='count'>" + filtered.length + " items</span></div>";
    if (!filtered.length) h += "<div class='empty'>Nothing due today.</div>";
    else filtered.forEach(function(item){ h += renderItem(item); });
    main.innerHTML = h;
    return;
  }

  if (list === "projects") {
    var h = "<div class='list-header'><h2>&#128193; Projects</h2><span class='count'>" + projects.length + " items</span></div>";
    if (!projects.length) { h += "<div class='empty'>No projects yet.</div>"; main.innerHTML = h; return; }
    projects.forEach(function(p) {
      var pItems = items.filter(function(i){ return i.project === p.name; });
      var nItems = pItems.filter(function(i){ return i.list === "next"; });
      var wItems = pItems.filter(function(i){ return i.list === "waiting"; });
      h += "<div class='item' onclick='this.classList.toggle(\"expanded\")'>";
      h += "<div class='item-body'>";
      h += "<div style='display:flex;justify-content:space-between;align-items:center'>";
      h += "<span class='item-title'>" + esc(p.name) + "</span>";
      h += "<div style='display:flex;gap:6px;align-items:center'>";
      if (p.area) h += "<span class='tag'>" + esc(p.area) + "</span>";
      h += "<span class='tag'>" + pItems.length + " action" + (pItems.length !== 1 ? "s" : "") + "</span>";
      h += "<span style='color:#3a3628;font-size:11px'>&#9654;</span></div></div>";
      if (p.outcome) h += "<div style='margin-top:4px;font-size:12px;color:#9a9080;font-style:italic'>" + esc(p.outcome) + "</div>";
      h += "<div class='item-details'>";
      if (!pItems.length) {
        h += "<div style='font-size:12px;color:#3a3628;font-style:italic'>No actions yet</div>";
      } else {
        if (nItems.length) {
          h += "<div style='font-size:11px;color:#6b6456;margin-bottom:4px'>&#9889; NEXT</div>";
          nItems.forEach(function(i) {
            h += "<div style='display:flex;align-items:center;gap:8px;padding:7px 10px;background:#0f0e0c;border-radius:4px;border:1px solid #2a2820;margin-bottom:4px'>";
            h += "<button class='circle' style='width:16px;height:16px' onclick='event.stopPropagation();completeItem(event,\"" + i.id + "\")' title='Complete'></button>";
            h += "<span style='font-size:12px;flex:1'>" + esc(i.title) + "</span></div>";
          });
        }
        if (wItems.length) {
          h += "<div style='font-size:11px;color:#6b6456;margin:6px 0 4px'>&#8987; WAITING</div>";
          wItems.forEach(function(i) {
            h += "<div style='display:flex;align-items:center;gap:8px;padding:7px 10px;background:#0f0e0c;border-radius:4px;border:1px solid #2a2820;margin-bottom:4px'>";
            h += "<span style='font-size:12px;flex:1;color:#9a9080'>" + esc(i.title) + "</span>";
            if (i.waiting_for) h += "<span class='tag'>" + esc(i.waiting_for) + "</span>";
            h += "</div>";
          });
        }
      }
      h += "</div></div></div>";
    });
    main.innerHTML = h;
    return;
  }

  if (list === "data") {
    var h = "<div class='list-header'><h2>&#9776; Data</h2><span class='count'>" + tables.length + " tables</span></div>";
    if (!tables.length) { h += "<div class='empty'>No data tables yet.</div>"; main.innerHTML = h; return; }
    tables.forEach(function(t, ti) {
      h += "<div class='data-card' id='tbl-" + ti + "'>";
      h += "<div class='data-card-header'>";
      h += "<span class='data-card-title'>" + esc(t.title) + "</span>";
      h += "<div style='display:flex;gap:8px;align-items:center'>";
      if (t.area) h += "<span class='tag'>" + esc(t.area) + "</span>";
      h += "<button class='copy-btn' id='copybtn-" + ti + "' onclick='copyTable(" + ti + ")'>&#128203; Copy</button>";
      h += "</div></div>";
      h += "<table class='data-table'><thead><tr>";
      t.headers.forEach(function(hd){ h += "<th>" + esc(hd) + "</th>"; });
      h += "</tr></thead><tbody>";
      t.rows.forEach(function(row){
        h += "<tr>";
        row.forEach(function(cell){ h += "<td>" + esc(cell) + "</td>"; });
        h += "</tr>";
      });
      h += "</tbody></table></div>";
    });
    main.innerHTML = h;
    return;
  }


  if (list === "areas") {
    var areaSet = {};
    items.forEach(function(i){ if (i.area) areaSet[i.area] = true; });
    projects.forEach(function(p){ if (p.area) areaSet[p.area] = true; });
    var areas = Object.keys(areaSet).sort();

    var h = "<div class='list-header'><h2>&#9632; Areas</h2><span class='count'>" + areas.length + " clients</span></div>";
    if (!areas.length) { h += "<div class='empty'>No areas defined yet.</div>"; main.innerHTML = h; return; }

    areas.forEach(function(area) {
      var aProjects = projects.filter(function(p){ return p.area === area; });
      var aItems = items.filter(function(i){ return i.area === area && !i.project; });
      var aNext = aItems.filter(function(i){ return i.list === "next"; });
      var aWaiting = aItems.filter(function(i){ return i.list === "waiting"; });

      h += "<div class='item' onclick='this.classList.toggle(\"expanded\")'>";
      h += "<div class='item-body'>";
      h += "<div style='display:flex;justify-content:space-between;align-items:center'>";
      h += "<span class='item-title' style='font-size:15px;font-weight:700'>" + esc(area) + "</span>";
      h += "<div style='display:flex;gap:6px;align-items:center'>";
      if (aProjects.length) h += "<span class='tag'>" + aProjects.length + " project" + (aProjects.length !== 1 ? "s" : "") + "</span>";
      if (aItems.length) h += "<span class='tag'>" + aItems.length + " action" + (aItems.length !== 1 ? "s" : "") + "</span>";
      h += "<span style='color:#3a3628;font-size:11px'>&#9654;</span></div></div>";
      h += "<div class='item-details'>";

      if (aProjects.length) {
        h += "<div style='font-size:11px;color:#6b6456;margin-bottom:6px'>&#128193; PROJECTS</div>";
        aProjects.forEach(function(p) {
          var pNext = items.filter(function(i){ return i.project === p.name && i.list === "next"; });
          var pWait = items.filter(function(i){ return i.project === p.name && i.list === "waiting"; });
          h += "<div style='background:#0f0e0c;border:1px solid #2a2820;border-radius:4px;padding:8px 12px;margin-bottom:6px'>";
          h += "<div style='font-size:12px;font-weight:600;margin-bottom:4px'>" + esc(p.name) + "</div>";
          pNext.forEach(function(i){
            h += "<div style='font-size:12px;color:#9a9080;padding:2px 0;display:flex;align-items:center;gap:6px'>";
            h += "<button class='circle' style='width:14px;height:14px;flex-shrink:0' onclick='event.stopPropagation();completeItem(event,\"" + i.id + "\")' title='Complete'></button>";
            h += "<span>&#9889; " + esc(i.title) + "</span></div>";
          });
          pWait.forEach(function(i){
            h += "<div style='font-size:12px;color:#6b6456;padding:2px 0'>&#8987; " + esc(i.title) + "</div>";
          });
          if (!pNext.length && !pWait.length) h += "<div style='font-size:11px;color:#3a3828;font-style:italic'>No open actions</div>";
          h += "</div>";
        });
      }

      if (aNext.length || aWaiting.length) {
        h += "<div style='font-size:11px;color:#6b6456;margin-bottom:6px;margin-top:4px'>&#9889; STANDALONE ACTIONS</div>";
        aNext.forEach(function(i){
          h += "<div style='display:flex;align-items:center;gap:8px;padding:6px 10px;background:#0f0e0c;border-radius:4px;border:1px solid #2a2820;margin-bottom:4px'>";
          h += "<button class='circle' style='width:14px;height:14px;flex-shrink:0' onclick='event.stopPropagation();completeItem(event,\"" + i.id + "\")' title='Complete'></button>";
          h += "<span style='font-size:12px;flex:1'>" + esc(i.title) + "</span></div>";
        });
        aWaiting.forEach(function(i){
          h += "<div style='display:flex;align-items:center;gap:8px;padding:6px 10px;background:#0f0e0c;border-radius:4px;border:1px solid #2a2820;margin-bottom:4px'>";
          h += "<span style='font-size:12px;flex:1;color:#6b6456'>&#8987; " + esc(i.title) + "</span>";
          if (i.waiting_for) h += "<span class='tag'>" + esc(i.waiting_for) + "</span>";
          h += "</div>";
        });
      }

      if (!aProjects.length && !aItems.length) h += "<div style='font-size:12px;color:#3a3628;font-style:italic'>Nothing active</div>";
      h += "</div></div></div>";
    });
    main.innerHTML = h;
    return;
  }

  if (list === "archive") {
    main.innerHTML = "<div class='loading'>Loading archive...</div>";
    var h2 = { apikey: SBK, Authorization: "Bearer " + SBK };
    fetch(SBU + "/rest/v1/gtd_items?select=*&status=eq.completed&order=updated_at.desc&limit=50", { headers: h2 })
      .then(function(r){ return r.json(); })
      .then(function(archived) {
        var h = "<div class='list-header'><h2>&#128452; Archive</h2><span class='count'>" + archived.length + " items</span></div>";
        if (!archived.length) { h += "<div class='empty'>No completed items yet.</div>"; main.innerHTML = h; return; }
        archived.forEach(function(item) {
          h += "<div class='archive-item'>";
          h += "<div style='flex:1'>";
          h += "<div style='font-size:13px;color:#6b6456;text-decoration:line-through'>" + esc(item.title) + "</div>";
          h += "<div style='font-size:11px;color:#3a3828;margin-top:2px'>" + (item.area ? esc(item.area) + " &middot; " : "") + esc(item.list) + "</div>";
          h += "</div>";
          h += "<button class='restore-btn' onclick='restoreItem(\"" + item.id + "\")'>Restore</button>";
          h += "</div>";
        });
        main.innerHTML = h;
      });
    return;
  }

  // Generic list render (inbox, next, waiting, someday, reference)
  var icons = {inbox:"&#11015;",next:"&#9889;",waiting:"&#8987;",someday:"&#127793;",reference:"&#128193;"};
  var labels = {inbox:"Inbox",next:"Next Actions",waiting:"Waiting For",someday:"Someday / Maybe",reference:"Reference"};
  var filtered = items.filter(function(i){ return i.list === list; });
  var h = "<div class='list-header'><h2>" + icons[list] + " " + labels[list] + "</h2><span class='count'>" + filtered.length + " items</span></div>";
  if (!filtered.length) h += "<div class='empty'>This list is empty.</div>";
  else filtered.forEach(function(item){ h += renderItem(item); });
  main.innerHTML = h;
}

async function completeItem(e, id) {
  e.stopPropagation();
  var item = items.find(function(i){ return i.id === id; });
  if (!item) return;
  undoItem = item;
  items = items.filter(function(i){ return i.id !== id; });
  updateCounts();
  renderList(currentList);
  document.getElementById("toast-msg").textContent = "\u201c" + item.title + "\u201d completed";
  var toast = document.getElementById("toast");
  toast.classList.add("show");
  if (undoTimer) clearTimeout(undoTimer);
  undoTimer = setTimeout(function() {
    toast.classList.remove("show");
    undoItem = null;
    fetch("https://vmzopccmnfccjvdrzsxe.supabase.co/functions/v1/gtd-complete", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: id })
    }).then(function(r){ return r.json(); }).then(function(data){
      if (data.recurring) setTimeout(loadData, 300);
    });
  }, 5000);
}

function undoComplete() {
  if (undoTimer) { clearTimeout(undoTimer); undoTimer = null; }
  if (undoItem) {
    items.push(undoItem);
    items.sort(function(a,b){ return new Date(b.created_at) - new Date(a.created_at); });
    undoItem = null;
    updateCounts();
    renderList(currentList);
  }
  document.getElementById("toast").classList.remove("show");
}

async function restoreItem(id) {
  var h = { apikey: SBK, Authorization: "Bearer " + SBK, "Content-Type": "application/json", Prefer: "return=representation" };
  var res = await fetch(SBU + "/rest/v1/gtd_items?id=eq." + id, {
    method: "PATCH", headers: h,
    body: JSON.stringify({ status: "active" })
  });
  var data = await res.json();
  if (data && data[0]) {
    items.push(data[0]);
    items.sort(function(a,b){ return new Date(b.created_at) - new Date(a.created_at); });
    updateCounts();
  }
  renderList("archive");
}

function copyTable(ti) {
  var t = tables[ti];
  var text = t.headers.join("\t") + "\n";
  t.rows.forEach(function(row){ text += row.join("\t") + "\n"; });
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById("copybtn-" + ti);
    btn.textContent = "Copied!";
    btn.classList.add("copied");
    setTimeout(function(){ btn.innerHTML = "&#128203; Copy"; btn.classList.remove("copied"); }, 2000);
  });
}

function jumpToTable(tableId) {
  var btn = document.getElementById("btn-data");
  showList(btn, "data");
  setTimeout(function() {
    var idx = tables.findIndex(function(t){ return t.id === tableId; });
    var card = document.getElementById("tbl-" + idx);
    if (card) {
      card.scrollIntoView({ behavior: "smooth" });
      card.style.borderColor = "#c9a96e";
      setTimeout(function(){ card.style.borderColor = ""; }, 2000);
    }
  }, 100);
}

loadData();
</script>
